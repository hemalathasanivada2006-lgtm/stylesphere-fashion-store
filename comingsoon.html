<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon | StyleSphere</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
    animation:fadeIn 1.5s ease;
}

.container h1{
    font-size:90px;
    color:#38bdf8;
}

.container h2{
    font-size:42px;
    margin:20px 0;
}

.container p{
    font-size:18px;
    color:#d1d5db;
    max-width:600px;
    margin:auto;
    line-height:30px;
}

.home-btn{
    display:inline-block;
    margin-top:40px;
    text-decoration:none;
    background:#38bdf8;
    color:white;
    padding:15px 40px;
    border-radius:35px;
    font-size:18px;
    transition:.3s;
}

.home-btn:hover{
    background:#0ea5e9;
    transform:scale(1.08);
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">

<h1>🚧</h1>

<h2>Feature Coming Soon!</h2>

<p>
We're working hard to bring this feature to StyleSphere.
Stay tuned for exciting updates and an even better shopping experience.
</p>

<a href="index.html" class="home-btn">
🏠 Back to Home
</a>

</div>

</body>
</html>
